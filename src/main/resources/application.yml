spring:
  application:
    name: poc-spring-batch

  datasource:
    url: jdbc:h2:mem:batchdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

server:
  port: 8080

batch:
  input:
    directory: C:/dev/document_test
  archive:
    directory: C:/dev/doc_archiver

app:
  jwt:
    secret: MySecretKeyForJwtTokenMustBe256BitsLongAtLeast12345
    expiration-minutes: 5

logging:
  level:
    com.poc: DEBUG
    org.springframework.batch: INFO
    org.springframework.security: WARN